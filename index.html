<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="时光刻录机">
  <title>时光刻录机</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --accent2: #818cf8;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: #334155;
      --danger: #ef4444;
      --success: #22c55e;
      --detail: #cbd5e1;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .header {
      padding: 20px 16px 12px;
      text-align: center;
      position: sticky;
      top: 0;
      background: rgba(15,23,42,0.9);
      backdrop-filter: blur(16px);
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }
    .header h1 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }
    .clock-display {
      font-size: 44px;
      font-weight: 200;
      font-variant-numeric: tabular-nums;
      margin: 6px 0 2px;
      letter-spacing: 2px;
    }
    .date-display {
      font-size: 13px;
      color: var(--muted);
    }
    .input-section {
      padding: 12px 16px 14px;
      background: var(--card);
      margin: 0 12px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }
    .event-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .event-input:focus { border-color: var(--accent); }
    .event-input::placeholder { color: #64748b; }
    .input-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      text-align: right;
    }
    .input-hint.warning { color: var(--danger); }
    .btn-record {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 14px;
      padding: 0 22px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.2s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .btn-record:active { transform: scale(0.96); }
    .quick-tags {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .tag {
      background: rgba(56,189,248,0.08);
      border: 1px solid rgba(56,189,248,0.15);
      color: var(--accent);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      position: relative;
    }
    .tag:active { transform: scale(0.95); background: rgba(56,189,248,0.2); }
    .tag.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 2px 12px rgba(56,189,248,0.3);
    }
    .tag.recording {
      animation: pulse 0.5s ease;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    .filter-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 10px;
    }
    .filter-info {
      font-size: 13px;
      color: var(--muted);
    }
    .filter-info span {
      color: var(--accent);
      font-weight: 600;
    }
    .btn-clear-filter {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: var(--danger);
      padding: 5px 12px;
      border-radius: 10px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-clear-filter:active { transform: scale(0.95); }
    .timeline {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 80px;
    }
    .timeline::-webkit-scrollbar { display: none; }
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: var(--muted);
    }
    .empty-state svg {
      width: 56px;
      height: 56px;
      margin-bottom: 14px;
      opacity: 0.3;
    }
    .timeline-item {
      display: flex;
      gap: 14px;
      margin-bottom: 14px;
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .time-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 56px;
    }
    .time-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px rgba(56,189,248,0.35);
      margin-top: 5px;
    }
    .time-line {
      width: 2px;
      flex: 1;
      background: linear-gradient(to bottom, var(--accent), transparent);
      margin-top: 6px;
      opacity: 0.25;
    }
    .time-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }
    .card {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      position: relative;
      transition: transform 0.15s;
    }
    .card:active { transform: scale(0.98); }
    .card-event {
      font-size: 15px;
      line-height: 1.5;
      word-break: break-word;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-event .event-icon {
      font-size: 14px;
      flex-shrink: 0;
    }
    .card-detail {
      font-size: 13px;
      color: var(--detail);
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px dashed var(--border);
      line-height: 1.5;
      word-break: break-word;
    }
    .card-detail:empty { display: none; }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }
    .card-time {
      font-size: 12px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .card-actions {
      display: flex;
      gap: 10px;
    }
    .card-actions button {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      padding: 3px;
      transition: color 0.2s;
    }
    .card-actions button:hover { color: var(--text); }
    .card-actions .del:hover { color: var(--danger); }
    .fab-clear {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transition: all 0.2s;
      z-index: 20;
    }
    .fab-clear:active { transform: scale(0.9); background: rgba(239,68,68,0.1); color: var(--danger); border-color: var(--danger); }
    .toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(-60px);
      background: var(--card);
      border: 1px solid var(--border);
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 14px;
      color: var(--text);
      z-index: 100;
      transition: transform 0.3s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .edit-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 20px;
    }
    .edit-overlay.active { display: flex; }
    .edit-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      width: 100%;
      max-width: 400px;
    }
    .edit-box h3 { margin-bottom: 12px; font-size: 16px; }
    .edit-box .edit-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .edit-box .edit-label span {
      color: var(--accent);
      font-weight: 600;
    }
    .edit-box input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      color: var(--text);
      font-size: 15px;
      margin-bottom: 16px;
      outline: none;
    }
    .edit-box input:focus { border-color: var(--accent); }
    .edit-actions { display: flex; gap: 10px; }
    .edit-actions button { flex: 1; padding: 12px; border-radius: 12px; border: none; font-size: 15px; cursor: pointer; }
    .btn-cancel { background: var(--bg); color: var(--text); border: 1px solid var(--border) !important; }
    .btn-save { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
    .date-separator {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0 14px 70px;
      color: var(--muted);
      font-size: 12px;
    }
    .date-separator::before {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .date-separator::after {
      content: '';
      width: 40px;
      height: 1px;
      background: var(--border);
    }
    .tag-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      text-align: center;
    }
    .tag-hint span { color: var(--accent); }
    .recorded-tags {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
      min-height: 0;
    }
    .recorded-tags:empty { display: none; }
    .recorded-tag {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      color: var(--success);
      padding: 5px 12px;
      border-radius: 16px;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      animation: tagPop 0.3s ease;
    }
    @keyframes tagPop {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
    .recorded-tag .tag-time {
      font-size: 10px;
      opacity: 0.7;
      margin-left: 2px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>⏱ 时光刻录机</h1>
    <div class="clock-display" id="clock">00:00</div>
    <div class="date-display" id="date">载入中...</div>
  </div>

  <div class="input-section">
    <div class="input-row">
      <input type="text" class="event-input" id="eventInput" placeholder="输入最多4个字..." autocomplete="off" maxlength="4">
      <button class="btn-record" id="btnRecord" onclick="addEvent()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
        记录
      </button>
    </div>
    <div class="input-hint" id="inputHint">最多输入 4 个汉字，超出需点击记录后编辑</div>
    <div class="quick-tags" id="quickTags">
      <span class="tag" data-filter="胰岛素" onclick="handleTagClick(this, '胰岛素')">💉 胰岛素</span>
      <span class="tag" data-filter="用餐" onclick="handleTagClick(this, '用餐')">☕ 用餐</span>
      <span class="tag" data-filter="运动" onclick="handleTagClick(this, '运动')">🏃 运动</span>
      <span class="tag" data-filter="血糖" onclick="handleTagClick(this, '血糖')">💊 血糖</span>
      <span class="tag" data-filter="手指血" onclick="handleTagClick(this, '手指血')">🔵 手指血</span>
       </div>
    <div class="tag-hint">💡 单击标签 <span>立即记录</span>，长按标签 <span>筛选查看</span></div>
    <div class="recorded-tags" id="recordedTags"></div>
  </div>

  <div class="filter-bar" id="filterBar" style="display:none;">
    <div class="filter-info">筛选「<span id="filterName">--</span>」共 <span id="filterCount">0</span> 条</div>
    <button class="btn-clear-filter" onclick="clearFilter()">✕ 清除筛选</button>
  </div>

  <div class="timeline" id="timeline">
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <p>还没有记录，点击上方按钮或输入内容开始记录你的时间</p>
    </div>
  </div>

  <button class="fab-clear" onclick="clearAll()" title="清空全部记录">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path></svg>
  </button>

  <div class="toast" id="toast"></div>

  <div class="edit-overlay" id="editOverlay">
    <div class="edit-box">
      <h3>✏️ 补充详情</h3>
      <div class="edit-label">主标签：<span id="editMainLabel">--</span></div>
      <input type="text" id="editInput" placeholder="输入详细描述...">
      <div class="edit-actions">
        <button class="btn-cancel" onclick="closeEdit()">取消</button>
        <button class="btn-save" onclick="saveEdit()">保存</button>
      </div>
    </div>
  </div>

  <script>
    let events = JSON.parse(localStorage.getItem('timeLogger_events') || '[]');
    let editingId = null;
    let currentFilter = null;
    let longPressTimer = null;
    let isLongPress = false;

    const TAG_KEYWORDS = {
      '工作': ['工作', '上班', '办公', 'coding', 'code', '编程', '写代码', '开发', '项目'],
      '休息': ['休息', '放松', '摸鱼', '发呆', '小憩', '躺平'],
      '会议': ['会议', '开会', '讨论', '汇报', '评审', '例会'],
      '用餐': ['用餐', '吃饭', '早餐', '午餐', '晚餐', '早饭', '午饭', '晚饭', '食堂', '外卖', '点餐', '吃', '喝', '咖啡', '奶茶'],
      '运动': ['运动', '跑步', '健身', '锻炼', '游泳', '瑜伽', '打球', '散步', '走路'],
      '学习': ['学习', '阅读', '看书', '听课', '培训', '考证', '复习', '备考', '刷题']
    };

    const TAG_ICONS = {
      '工作': '💼',
      '休息': '☕',
      '会议': '🗣',
      '用餐': '🍽',
      '运动': '🏃',
      '学习': '📖'
    };

    const TAG_LABELS = {
      '工作': '💼 工作',
      '休息': '☕ 休息',
      '会议': '🗣 会议',
      '用餐': '🍽 用餐',
      '运动': '🏃 运动',
      '学习': '📖 学习'
    };

    function pad(n) { return n < 10 ? '0' + n : n; }

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
      const days = ['周日','周一','周二','周三','周四','周五','周六'];
      document.getElementById('date').textContent = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 ' + days[now.getDay()];
    }
    setInterval(updateClock, 1000);
    updateClock();

    function formatTime(ts) {
      const d = new Date(ts);
      return pad(d.getHours()) + ':' + pad(d.getMinutes());
    }

    function formatFullTime(ts) {
      const d = new Date(ts);
      return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }

    function formatDate(ts) {
      const d = new Date(ts);
      return d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日';
    }

    function isSameDay(ts1, ts2) {
      const d1 = new Date(ts1);
      const d2 = new Date(ts2);
      return d1.getFullYear() === d2.getFullYear() && d1.getMonth() === d2.getMonth() && d1.getDate() === d2.getDate();
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function saveEvents() {
      localStorage.setItem('timeLogger_events', JSON.stringify(events));
    }

    function matchesFilter(content, filterKey) {
      const keywords = TAG_KEYWORDS[filterKey] || [filterKey];
      const lower = content.toLowerCase();
      return keywords.some(k => lower.includes(k.toLowerCase()));
    }

    function getEventIcon(content) {
      for (let key in TAG_KEYWORDS) {
        if (matchesFilter(content, key)) {
          return TAG_ICONS[key];
        }
      }
      return '●';
    }

    function countChineseChars(str) {
      let count = 0;
      for (let char of str) {
        if (/[\u4e00-\u9fa5]/.test(char)) count++;
        else if (/\S/.test(char)) count += 0.5;
      }
      return Math.ceil(count);
    }

    function truncateTo4Chars(str) {
      let result = '';
      let count = 0;
      for (let char of str) {
        if (/[\u4e00-\u9fa5]/.test(char)) {
          if (count >= 4) break;
          count++;
          result += char;
        } else if (/\S/.test(char)) {
          if (count >= 3.5) break;
          count += 0.5;
          result += char;
        }
      }
      return result;
    }

    function addEvent(text) {
      const input = document.getElementById('eventInput');
      let content = text || input.value.trim();
      if (!content) { input.focus(); return; }

      const charCount = countChineseChars(content);
      if (charCount > 4 && !text) {
        content = truncateTo4Chars(content);
        input.value = content;
        showToast('⚠ 已截短至4个字，如需更多内容请编辑补充详情');
      }

      const ev = { id: Date.now(), timestamp: Date.now(), content: content, detail: '' };
      events.unshift(ev);
      saveEvents();
      render();
      renderRecordedTags();
      if (!text) input.value = '';
      showToast('✓ 已记录 ' + formatTime(ev.timestamp) + ' ' + content);
      input.focus();
    }

    function renderRecordedTags() {
      const container = document.getElementById('recordedTags');
      const todayEvents = events.filter(e => {
        const d = new Date(e.timestamp);
        const n = new Date();
        return d.getFullYear() === n.getFullYear() && d.getMonth() === n.getMonth() && d.getDate() === n.getDate();
      }).slice(0, 10);

      if (todayEvents.length === 0) {
        container.innerHTML = '';
        return;
      }

      let html = '';
      todayEvents.forEach(ev => {
        html += `<span class="recorded-tag">${escapeHtml(ev.content)}<span class="tag-time">${formatTime(ev.timestamp)}</span></span>`;
      });
      container.innerHTML = html;
    }

    function handleTagClick(el, filterKey) {
      if (isLongPress) return;
      const label = TAG_LABELS[filterKey] || filterKey;
      addEvent(label);
      el.classList.add('recording');
      setTimeout(() => el.classList.remove('recording'), 500);
    }

    function handleTagLongPress(filterKey) {
      isLongPress = true;
      const isActive = document.querySelector(`[data-filter="${filterKey}"]`).classList.contains('active');
      document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
      if (isActive) {
        currentFilter = null;
        render();
      } else {
        document.querySelector(`[data-filter="${filterKey}"]`).classList.add('active');
        currentFilter = filterKey;
        render();
      }
      setTimeout(() => { isLongPress = false; }, 300);
    }

    function setupLongPress() {
      document.querySelectorAll('.tag').forEach(tag => {
        const filterKey = tag.getAttribute('data-filter');

        tag.addEventListener('touchstart', function(e) {
          isLongPress = false;
          longPressTimer = setTimeout(() => {
            handleTagLongPress(filterKey);
          }, 600);
        }, { passive: true });

        tag.addEventListener('touchend', function(e) {
          clearTimeout(longPressTimer);
        });

        tag.addEventListener('touchmove', function(e) {
          clearTimeout(longPressTimer);
        });

        tag.addEventListener('mousedown', function(e) {
          if (e.button !== 0) return;
          isLongPress = false;
          longPressTimer = setTimeout(() => {
            handleTagLongPress(filterKey);
          }, 600);
        });

        tag.addEventListener('mouseup', function(e) {
          clearTimeout(longPressTimer);
        });

        tag.addEventListener('mouseleave', function(e) {
          clearTimeout(longPressTimer);
        });

        tag.addEventListener('contextmenu', function(e) {
          e.preventDefault();
        });
      });
    }

    function clearFilter() {
      currentFilter = null;
      document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
      render();
    }

    function deleteEvent(id) {
      if (!confirm('确定删除这条记录吗？')) return;
      events = events.filter(e => e.id !== id);
      saveEvents();
      render();
      renderRecordedTags();
      showToast('已删除');
    }

    function openEdit(id) {
      const ev = events.find(e => e.id === id);
      if (!ev) return;
      editingId = id;
      document.getElementById('editMainLabel').textContent = ev.content;
      document.getElementById('editInput').value = ev.detail || '';
      document.getElementById('editOverlay').classList.add('active');
      setTimeout(() => document.getElementById('editInput').focus(), 100);
    }

    function closeEdit() {
      document.getElementById('editOverlay').classList.remove('active');
      editingId = null;
    }

    function saveEdit() {
      const val = document.getElementById('editInput').value.trim();
      const ev = events.find(e => e.id === editingId);
      if (ev) { 
        ev.detail = val; 
        saveEvents(); 
        render(); 
        renderRecordedTags(); 
        showToast(val ? '已保存详情' : '已清空详情'); 
      }
      closeEdit();
    }

    function clearAll() {
      if (events.length === 0) { showToast('暂无记录'); return; }
      if (!confirm('确定清空所有记录吗？此操作不可恢复。')) return;
      events = [];
      saveEvents();
      currentFilter = null;
      document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
      render();
      renderRecordedTags();
      showToast('已清空全部记录');
    }

    function render() {
      const timeline = document.getElementById('timeline');
      const filterBar = document.getElementById('filterBar');
      const filterName = document.getElementById('filterName');
      const filterCount = document.getElementById('filterCount');

      let displayEvents = events.slice();

      if (currentFilter) {
        displayEvents = displayEvents.filter(e => matchesFilter(e.content, currentFilter));
        filterBar.style.display = 'flex';
        filterName.textContent = currentFilter;
        filterCount.textContent = displayEvents.length;
      } else {
        filterBar.style.display = 'none';
      }

      if (displayEvents.length === 0) {
        let msg = currentFilter ? '没有找到「' + currentFilter + '」相关记录' : '还没有记录，点击上方按钮或输入内容开始记录你的时间';
        timeline.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><p>' + msg + '</p></div>';
        return;
      }

      let html = '';
      let lastDate = null;

      displayEvents.forEach((ev, idx) => {
        const evDate = formatDate(ev.timestamp);
        if (!lastDate || evDate !== lastDate) {
          html += '<div class="date-separator">' + evDate + '</div>';
          lastDate = evDate;
        }
        const isLast = idx === displayEvents.length - 1 || !isSameDay(ev.timestamp, displayEvents[idx+1]?.timestamp);
        const icon = getEventIcon(ev.content);
        const detailHtml = ev.detail ? `<div class="card-detail">${escapeHtml(ev.detail)}</div>` : '';
        html += `
          <div class="timeline-item">
            <div class="time-col">
              <div class="time-text">${formatTime(ev.timestamp)}</div>
              <div class="time-dot"></div>
              ${!isLast ? '<div class="time-line"></div>' : '<div style="width:2px;flex:1;opacity:0"></div>'}
            </div>
            <div class="card">
              <div class="card-event"><span class="event-icon">${icon}</span>${escapeHtml(ev.content)}</div>
              ${detailHtml}
              <div class="card-meta">
                <div class="card-time">${formatFullTime(ev.timestamp)}</div>
                <div class="card-actions">
                  <button onclick="openEdit(${ev.id})">补充详情</button>
                  <button class="del" onclick="deleteEvent(${ev.id})">删除</button>
                </div>
              </div>
            </div>
          </div>
        `;
      });
      timeline.innerHTML = html;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.getElementById('eventInput').addEventListener('input', function(e) {
      const val = e.target.value;
      const count = countChineseChars(val);
      const hint = document.getElementById('inputHint');
      if (count > 4) {
        hint.textContent = '已超出4字限制，将自动截短';
        hint.classList.add('warning');
      } else {
        hint.textContent = '最多输入 4 个汉字，超出需点击记录后编辑';
        hint.classList.remove('warning');
      }
    });

    document.getElementById('eventInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addEvent();
    });
    document.getElementById('editInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') saveEdit();
      if (e.key === 'Escape') closeEdit();
    });
    document.getElementById('editOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeEdit();
    });

    render();
    renderRecordedTags();
    setupLongPress();
    document.getElementById('eventInput').focus();
  </script>
</body>
</html>
